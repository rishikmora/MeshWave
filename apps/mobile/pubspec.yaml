name: meshwave
description: Offline-first LoRa, BLE, and mesh communication platform.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.0
  cryptography: ^2.7.0
  flutter_blue_plus: ^1.35.5
  flutter_hooks: ^0.20.5
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hooks_riverpod: ^2.6.1
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  mobile_scanner: ^6.0.6
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  test: ^1.25.15

flutter:
  uses-material-design: true
  assets:
    - assets/
