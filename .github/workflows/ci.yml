name: MeshWave CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mobile:
    name: Flutter app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test --coverage

  firmware:
    name: ESP32 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install platformio
      - run: pio run
        working-directory: firmware/esp32-lora

  database:
    name: Supabase schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f backend/supabase/migrations/0001_initial_schema.sql
